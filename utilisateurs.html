<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestion des utilisateurs — Mon Éditeur De Livre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="nav">
    <div class="contenu nav-in">
      <a href="index.html" class="marque">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8a4b38" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5C10.5 4.3 8.3 3.8 6 4c-1 .1-2 .3-3 .6v14c1-.3 2-.5 3-.6 2.3-.2 4.5.3 6 1.5 1.5-1.2 3.7-1.7 6-1.5 1 .1 2 .3 3 .6V4.6c-1-.3-2-.5-3-.6-2.3-.2-4.5.3-6 1.5Z"/><path d="M12 5.5v14"/></svg>
        Mon Éditeur De Livre
      </a>
      <div class="nav-actions">
        <a href="bibliotheque.html" class="btn btn-secondaire">← Mes livres</a>
        <button class="btn btn-fantome" onclick="seDeconnecter()">Se déconnecter</button>
      </div>
    </div>
  </nav>

  <!-- ===== En-tête ===== -->
  <header class="profil-entete">
    <div class="contenu">
      <div class="salut">Administration</div>
      <h1 style="font-size:30px;margin:2px 0 4px">Gestion des utilisateurs</h1>
      <p style="color:var(--ink-soft);margin:0">Ajoutez, modifiez ou supprimez les comptes qui peuvent se connecter.</p>
    </div>
  </header>

  <main class="contenu" style="padding-top:36px;padding-bottom:60px">

    <!-- Formulaire ajout / modification -->
    <div class="creer-livre admin-form">
      <h3 class="form-titre" id="formTitre">Ajouter un utilisateur</h3>
      <p class="form-note" id="formNote">Le mot de passe est stocké tel quel dans <code>users.json</code>.</p>
      <div class="creer-ligne">
        <input type="text" id="champLogin" placeholder="Identifiant">
        <input type="text" id="champPassword" placeholder="Mot de passe">
        <select id="champRole">
          <option value="user">Utilisateur</option>
          <option value="admin">Administrateur</option>
        </select>
        <button class="btn btn-primaire" id="btnEnregistrer" onclick="enregistrerUtilisateur()">Ajouter</button>
        <button class="btn btn-fantome" id="btnAnnuler" onclick="annulerEdition()" style="display:none">Annuler</button>
      </div>
      <p id="message" class="message"></p>
    </div>

    <!-- Liste des utilisateurs -->
    <div class="barre-section" style="margin-top:36px">
      <h2>Utilisateurs</h2>
    </div>
    <p style="color:var(--ink-soft);font-size:13px;margin:-8px 0 16px">Cliquez sur un utilisateur pour voir ses statistiques.</p>
    <ul id="listeUtilisateurs" class="user-liste"></ul>

  </main>

  <!-- Fiche statistiques d'un utilisateur (admin) -->
  <div id="modalStats" class="modal-fond" style="display:none" onclick="fermerStats(event)">
    <div class="modal-carte" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
      <button class="modal-fermer" onclick="fermerStats()" aria-label="Fermer">&#10005;</button>
      <div id="statsContenu"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="admin.js"></script>
</body>
</html>
