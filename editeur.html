<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon livre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="conteneur-livre">

    <aside class="sommaire">
      <h2 id="titreLivre">Mon livre</h2>
      <ul id="listePages"></ul>
      <div class="sommaire-actions">
        <button onclick="retourBibliotheque()" class="secondaire petit">&#8592; Bibliothèque</button>
        <button onclick="seDeconnecter()" class="secondaire petit">Se déconnecter</button>
      </div>
    </aside>

    <div class="zone-livre">

      <div class="barre-outils">
        <button onmousedown="event.preventDefault()" onclick="formater('bold')"><b>G</b></button>
        <button onmousedown="event.preventDefault()" onclick="formater('italic')"><i>I</i></button>
        <button onmousedown="event.preventDefault()" onclick="formater('underline')"><u>S</u></button>
        <select onmousedown="event.preventDefault()" onchange="formater('fontSize', this.value)">
          <option value="2">Petit</option>
          <option value="3" selected>Normal</option>
          <option value="5">Grand</option>
          <option value="7">Très grand</option>
        </select>
      </div>

      <div class="livre-ouvert">
        <div class="page-livre">
          <div id="pageGauche" class="texte-livre" contenteditable="true"></div>
          <div class="numero-page" id="numeroGauche"></div>
        </div>
        <div class="page-livre">
          <div id="pageDroite" class="texte-livre" contenteditable="true"></div>
          <div class="numero-page" id="numeroDroite"></div>
        </div>
      </div>

      <div class="barre-actions">
        <button onclick="pagePrecedente()">← Précédent</button>
        <button onclick="sauvegarder()">Sauvegarder</button>
        <button onclick="pageSuivante()">Suivant →</button>
      </div>

      <p id="message" class="message"></p>
    </div>
  </div>

  <div id="mesureCachee" class="texte-livre" style="position:absolute; visibility:hidden; left:-9999px; top:0;"></div>

  <script src="script.js"></script>
  <script src="editeur.js"></script>
</body>
</html>
