<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon livre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="conteneur-livre">

    <aside class="sommaire">
      <h2 id="titreLivre">Mon livre</h2>
      <ul id="listePages"></ul>
      <button onclick="nouvellePage()" class="secondaire petit">+ Nouvelle page</button>
    </aside>

    <main class="page-livre">
      <textarea id="zoneTexte" class="texte-livre" placeholder="Écris ton texte ici..."></textarea>

      <div class="numero-page" id="numeroPage"></div>

      <div class="barre-actions">
        <button onclick="pagePrecedente()">← Précédent</button>
        <button onclick="sauvegarder()">Sauvegarder</button>
        <button onclick="pageSuivante()">Suivant →</button>
      </div>

      <p id="message" class="message"></p>
    </main>
  </div>

  <div class="barre-basse">
    <button onclick="retourBibliotheque()" class="secondaire petit">← Retour à la bibliothèque</button>
    <button onclick="seDeconnecter()" class="secondaire petit">Se déconnecter</button>

  </div>

  <script src="script.js"></script>
  <script src="editeur.js"></script>
</body>
</html>
