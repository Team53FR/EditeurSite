<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon livre</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="conteneur-livre">

    <aside class="sommaire">
      <h2 id="titreLivre">Mon livre</h2>
      <ul id="listePages"></ul>
      <button onclick="nouvellePage()" class="secondaire petit">+ Nouvelle page</button>
    </aside>

    <main class="carte carte-large">
      <div class="entete-page">
        <input type="text" id="titrePage" placeholder="Titre de la page">
        <button onclick="supprimerPage()" class="danger petit">Supprimer</button>
      </div>

      <textarea id="zoneTexte" placeholder="Écris ton texte ici..."></textarea>

      <div class="barre-actions">
        <button onclick="pagePrecedente()">← Précédent</button>
        <button onclick="sauvegarder()">Sauvegarder</button>
        <button onclick="pageSuivante()">Suivant →</button>
      </div>

      <button onclick="retourBibliotheque()" class="secondaire">← Retour à la bibliothèque</button>
      <button onclick="seDeconnecter()" class="secondaire">Se déconnecter</button>

      <p id="message" class="message"></p>
    </main>

  </div>

  <script src="script.js"></script>
  <script src="editeur.js"></script>
</body>
</html>
