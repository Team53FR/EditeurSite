<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma bibliothèque</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="carte carte-large">
    <h1>Ma bibliothèque</h1>

    <ul id="listeLivres" class="liste-livres"></ul>

    <div class="entete-page">
      <input type="text" id="titreNouveauLivre" placeholder="Titre du nouveau livre">
      <select id="formatNouveauLivre" style="padding:8px;border:1px solid #ccc;border-radius:6px;font-size:14px;">
        <option value="149x210">Roman standard — 14,9 × 21,0 cm</option>
        <option value="155x235">Grand roman — 15,5 × 23,5 cm</option>
        <option value="105x148">Poche — 10,5 × 14,8 cm</option>
        <option value="210x297">A4 — 21,0 × 29,7 cm</option>
      </select>
      <button onclick="creerLivre()">+ Créer un livre</button>
    </div>

    <button onclick="seDeconnecter()" class="secondaire">Se déconnecter</button>

    <p id="message" class="message"></p>
  </div>

  <script src="script.js"></script>
  <script src="bibliotheque.js"></script>
</body>
</html>
