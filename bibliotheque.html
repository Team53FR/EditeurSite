<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mes livres — Mon Éditeur De Livre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="nav">
    <div class="contenu nav-in">
      <a href="index.html" class="marque">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8a4b38" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5C10.5 4.3 8.3 3.8 6 4c-1 .1-2 .3-3 .6v14c1-.3 2-.5 3-.6 2.3-.2 4.5.3 6 1.5 1.5-1.2 3.7-1.7 6-1.5 1 .1 2 .3 3 .6V4.6c-1-.3-2-.5-3-.6-2.3-.2-4.5.3-6 1.5Z"/><path d="M12 5.5v14"/></svg>
        Mon Éditeur De Livre
      </a>
      <div class="nav-actions">
        <button class="btn btn-fantome" onclick="seDeconnecter()">Se déconnecter</button>
      </div>
    </div>
  </nav>

  <!-- ===== En-tête profil ===== -->
  <header class="profil-entete">
    <div class="contenu profil-in">
      <div class="avatar" id="avatarInitiales">—</div>
      <div class="profil-txt">
        <div class="salut">Bon retour parmi nous,</div>
        <h1 id="profilNom">…</h1>
        <div class="profil-stats">
          <div class="stat"><b id="statLivres">0</b><span>livre(s)</span></div>
          <div class="stat"><b id="statPages">0</b><span>page(s) au total</span></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== Contenu ===== -->
  <main class="contenu">
    <div class="barre-section">
      <h2>Mes livres</h2>
    </div>

    <ul id="listeLivres" class="grille-livres"></ul>

    <div class="creer-livre">
      <h3>Créer un nouveau livre</h3>
      <div class="creer-ligne">
        <input type="text" id="titreNouveauLivre" placeholder="Titre du nouveau livre"
               onkeydown="if(event.key==='Enter'){creerLivre();}">
        <select id="formatNouveauLivre">
          <option value="149x210">Roman — 14,9 × 21,0 cm</option>
          <option value="155x235">Grand roman — 15,5 × 23,5 cm</option>
          <option value="105x148">Poche — 10,5 × 14,8 cm</option>
          <option value="210x297">A4 — 21,0 × 29,7 cm</option>
        </select>
        <button class="btn btn-primaire" onclick="creerLivre()">+ Créer un livre</button>
      </div>
    </div>

    <p id="message" class="message"></p>
  </main>

  <script src="script.js"></script>
  <script src="bibliotheque.js"></script>
</body>
</html>
